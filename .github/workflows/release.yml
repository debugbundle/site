name: Site Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release files
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const { existsSync, readFileSync } = require('node:fs');

          const manifest = JSON.parse(readFileSync('release-manifest.json', 'utf8'));
          if (manifest.distributionRef !== 'debugbundle/site') {
            throw new Error(`Unexpected distribution ref: ${manifest.distributionRef}`);
          }

          for (const fileName of manifest.requiredReleaseFiles) {
            if (!existsSync(fileName)) {
              throw new Error(`Missing required release file: ${fileName}`);
            }
          }
          EOF

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "debugbundle/site ${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md