name: Feature Request
description: Suggest an improvement to the DebugBundle public site.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem you are trying to solve, not just the proposed implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What content or workflow is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried?
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits, and how would this improve the public site?
    validations:
      required: true